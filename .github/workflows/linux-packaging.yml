# Build Linux DEB/RPM/Pacman/Snap/Flatpak from staged dotnet publish; optional SBOM. Extend matrix for arm64 as needed.
name: Linux packaging

on:
  workflow_dispatch:
  push:
    branches: [master, Linux]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  linux-packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev lintian rpm python3 curl ca-certificates git \
            flatpak flatpak-builder snapd squashfuse fuse3

      - name: Install Snapcraft
        run: |
          sudo systemctl start snapd.socket snapd.service 2>/dev/null || true
          timeout 180 sudo snap wait system seed.ready 2>/dev/null || true
          # Match snap base (core24) to ubuntu-latest (24.04); core22 often fails to install here.
          sudo snap install core24
          sudo snap install snapcraft --classic

      - name: Flatpak runtimes for flatpak-builder
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --user flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08 org.freedesktop.Sdk.Extension.dotnet8//24.08

      - name: Stage, package, lint, Docker smoke tests
        run: python3 packaging/ci/linux_build_and_test.py --arch ${{ matrix.arch }}

      - name: SBOM (syft)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          ./packaging/tools/sbom-and-attest.sh ${{ matrix.arch }}
        continue-on-error: true

      # upload-artifact respects .gitignore; packaging/out/ is ignored so .deb/.rpm were never uploaded.
      - name: Bundle packaging/out for artifact
        run: tar -czf "${RUNNER_TEMP}/videodedup-linux-packages.tgz" -C packaging out

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.arch }}-${{ github.sha }}
          if-no-files-found: error
          path: ${{ runner.temp }}/videodedup-linux-packages.tgz

  e2e-grpc-firewall:
    needs: linux-packages
    runs-on: ubuntu-latest
    env:
      # Prebuilt debian/fedora images (Flathub runtime for flatpak); plain fedora:40 fails with "No remote refs found for flathub".
      VD_USE_FIREWALL_SMOKE_BASE: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, distro: debian, format: deb, firewall: nft }
          - { arch: amd64, distro: debian, format: deb, firewall: iptables }
          - { arch: amd64, distro: ubuntu, format: deb, firewall: ufw }
          - { arch: amd64, distro: fedora, format: rpm, firewall: nft }
          - { arch: amd64, distro: fedora, format: rpm, firewall: firewalld }
          - { arch: amd64, distro: rocky, format: rpm, firewall: iptables }
          - { arch: amd64, distro: opensuse, format: rpm, firewall: nft }
          - { arch: amd64, distro: arch, format: staged, firewall: iptables }
          - { arch: amd64, distro: manjaro, format: staged, firewall: nft }
          - { arch: amd64, distro: arch, format: pacman, firewall: iptables }
          - { arch: amd64, distro: manjaro, format: pacman, firewall: nft }
          - { arch: amd64, distro: ubuntu, format: snap, firewall: nft }
          - { arch: amd64, distro: fedora, format: flatpak, firewall: nft }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages-${{ matrix.arch }}-${{ github.sha }}
          path: ${{ runner.temp }}/vd-pkg-art

      - name: Restore packaging/out from artifact
        run: |
          set -euo pipefail
          tg="$(find "${RUNNER_TEMP}/vd-pkg-art" -name 'videodedup-linux-packages.tgz' -print -quit)"
          if [[ -z "${tg}" || ! -f "${tg}" ]]; then
            echo "Missing videodedup-linux-packages.tgz in artifact" >&2
            find "${RUNNER_TEMP}/vd-pkg-art" -ls >&2 || true
            exit 1
          fi
          mkdir -p packaging
          tar -xzf "${tg}" -C packaging

      - name: Install helpers for stage.sh
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 git

      - name: Stage server tree (staged E2E + openSUSE RPM fallback)
        run: python3 packaging/tools/stage.py --arch ${{ matrix.arch }}

      - name: E2E gRPC through firewall
        run: |
          chmod +x packaging/tests/e2e/*.sh
          python3 ./packaging/tests/e2e/docker_grpc_firewall.py \
            --arch ${{ matrix.arch }} \
            --distro ${{ matrix.distro }} \
            --format ${{ matrix.format }} \
            --firewall ${{ matrix.firewall }}

  e2e-grpc-deep-smoke:
    needs: linux-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages-${{ matrix.arch }}-${{ github.sha }}
          path: ${{ runner.temp }}/vd-pkg-art

      - name: Restore packaging/out from artifact
        run: |
          set -euo pipefail
          tg="$(find "${RUNNER_TEMP}/vd-pkg-art" -name 'videodedup-linux-packages.tgz' -print -quit)"
          if [[ -z "${tg}" || ! -f "${tg}" ]]; then
            echo "Missing videodedup-linux-packages.tgz in artifact" >&2
            find "${RUNNER_TEMP}/vd-pkg-art" -ls >&2 || true
            exit 1
          fi
          mkdir -p packaging
          tar -xzf "${tg}" -C packaging

      - name: gRPC deep smoke (VideoDedupGrpcSmoke + VideoDedupGrpcComparisonSmoke)
        run: |
          chmod +x packaging/tests/e2e/*.sh
          python3 ./packaging/tests/e2e/docker_grpc_deep_smoke.py --arch ${{ matrix.arch }}
