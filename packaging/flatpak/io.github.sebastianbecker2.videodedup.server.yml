# Flatpak channel: user-run / dev only. Flatpak cannot install host systemd units.
# The same binary is published self-contained here for sandboxed use.
app-id: io.github.sebastianbecker2.videodedup.server
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet8
command: videodedup-server-launch.sh

finish-args:
  - --share=network

modules:
  - name: videodedupserver
    buildsystem: simple
    build-options:
      strip: false
      no-debuginfo: true
      build-args:
        - --share=network
      append-path: /usr/lib/sdk/dotnet8/bin
      append-ld-library-path: /usr/lib/sdk/dotnet8/lib
    build-commands:
      - |
        set -e
        DOTNET_CLI_TELEMETRY_OPTOUT=1
        dotnet publish VideoDedupService/VideoDedupService.csproj \
          -c Release \
          -r linux-x64 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -o "${FLATPAK_DEST}/lib/videodedupserver"
      - chmod 0755 "${FLATPAK_DEST}/lib/videodedupserver/VideoDedupService"
      - |
        set -e
        for f in appsettings.json appsettings.Development.json; do
          if test -f "VideoDedupService/$f"; then
            install -Dm644 "VideoDedupService/$f" "${FLATPAK_DEST}/lib/videodedupserver/$f"
          fi
        done
      - |
        set -e
        python3 - <<PY
        import json
        from pathlib import Path
        path = Path("${FLATPAK_DEST}/lib/videodedupserver/appsettings.json")
        data = json.loads(path.read_text(encoding="utf-8"))
        grpc = data.setdefault("Kestrel", {}).setdefault("Endpoints", {}).setdefault("gRPC", {})
        grpc["Url"] = "https://[::]:51726"
        grpc["Protocols"] = "Http2"
        grpc["Certificate"] = {"Path": "cert/VideoDedup.pfx", "Password": ""}
        path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
        PY
      - install -Dm755 packaging/flatpak/videodedup-server-launch.sh "${FLATPAK_DEST}/bin/videodedup-server-launch.sh"
      - |
        set -e
        mkdir -p "${FLATPAK_DEST}/lib/videodedupserver/cert-setup"
        for s in generate-server-cert.sh remove-server-cert.sh write-tls-env.sh; do
          sed 's/\r$//' "packaging/common/scripts/${s}" > "${FLATPAK_DEST}/lib/videodedupserver/cert-setup/${s}"
          chmod 0755 "${FLATPAK_DEST}/lib/videodedupserver/cert-setup/${s}"
        done
    sources:
      - type: dir
        path: ../..
