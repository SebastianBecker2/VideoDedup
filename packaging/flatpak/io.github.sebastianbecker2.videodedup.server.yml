# Flatpak channel: user-run / dev only. Flatpak cannot install host systemd units.
# The same binary is published self-contained here for sandboxed use.
app-id: io.github.sebastianbecker2.videodedup.server
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet8
command: VideoDedupService

finish-args:
  - --share=network

modules:
  - name: videodedupserver
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      append-path: /usr/lib/sdk/dotnet8/bin
      append-ld-library-path: /usr/lib/sdk/dotnet8/lib
    build-commands:
      - |
        set -e
        DOTNET_CLI_TELEMETRY_OPTOUT=1
        dotnet publish VideoDedupService/VideoDedupService.csproj \
          -c Release \
          -r linux-x64 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -o "${FLATPAK_DEST}/lib/videodedupserver"
      - install -Dm755 "${FLATPAK_DEST}/lib/videodedupserver/VideoDedupService" "${FLATPAK_DEST}/bin/VideoDedupService"
      - |
        set -e
        for f in appsettings.json appsettings.Development.json; do
          if test -f "VideoDedupService/$f"; then
            install -Dm644 "VideoDedupService/$f" "${FLATPAK_DEST}/lib/videodedupserver/$f"
          fi
        done
      - |
        set -e
        python3 - <<PY
        import json
        from pathlib import Path
        path = Path("${FLATPAK_DEST}/lib/videodedupserver/appsettings.json")
        data = json.loads(path.read_text(encoding="utf-8"))
        grpc = data.setdefault("Kestrel", {}).setdefault("Endpoints", {}).setdefault("gRPC", {})
        grpc["Url"] = "http://[::]:51726"
        grpc["Protocols"] = "Http2"
        grpc.pop("Certificate", None)
        path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
        PY
    sources:
      - type: dir
        path: ../..
