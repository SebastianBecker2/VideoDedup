name: videodedupserver
summary: Video deduplication gRPC server (VideoDedup)
description: |
  Snap packaging of the VideoDedup server. Uses classic confinement so the
  service can access user-selected library paths on the host.

  This channel runs a Snap-managed daemon (not the host systemd unit used by
  DEB/RPM). Data defaults to $SNAP_COMMON.

  Flatpak builds are intentionally limited to user-run/dev scenarios because
  Flatpak cannot install host systemd services.

grade: stable
confinement: classic
base: core24
version: "0.0.0"

parts:
  server:
    plugin: dump
    source: _dump
    organize:
      "*": usr/lib/videodedupserver/
    override-build: |
      craftctl default
      mkdir -p "$CRAFT_PART_INSTALL/usr/lib/videodedupserver/cert-setup"
      for s in generate-server-cert.sh remove-server-cert.sh write-tls-env.sh; do
        sed 's/\r$//' "$CRAFT_PROJECT_DIR/../common/scripts/$s" > \
          "$CRAFT_PART_INSTALL/usr/lib/videodedupserver/cert-setup/$s"
        chmod 0755 "$CRAFT_PART_INSTALL/usr/lib/videodedupserver/cert-setup/$s"
      done
      install -Dm755 "$CRAFT_PROJECT_DIR/videodedup-server-launch.sh" \
        "$CRAFT_PART_INSTALL/usr/bin/videodedup-server-launch.sh"

apps:
  videodedupserver:
    command: usr/bin/videodedup-server-launch.sh
    daemon: simple
    environment:
      VIDEODEDUP_APP_DATA: $SNAP_COMMON/data
    plugs:
      - network
      - network-bind
