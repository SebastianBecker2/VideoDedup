name: videodedupserver
summary: Video deduplication gRPC server (VideoDedup)
description: |
  Snap packaging of the VideoDedup server. Uses classic confinement so the
  service can access user-selected library paths on the host.

  This channel runs a Snap-managed daemon (not the host systemd unit used by
  DEB/RPM). Data defaults to $SNAP_COMMON.

  Flatpak builds are intentionally limited to user-run/dev scenarios because
  Flatpak cannot install host systemd services.

grade: stable
confinement: classic
base: core24
version: "0.0.0"

parts:
  server:
    plugin: dump
    source: _dump
    override-build: |
      set -eu
      dest="${CRAFT_PART_INSTALL}/usr/lib/videodedupserver"
      mkdir -p "${dest}"
      # Avoid craftctl default (cp --link); hard links break re-staging in destructive CI.
      cp -a . "${dest}/"
      sed 's/\r$//' "${CRAFT_PROJECT_DIR}/videodedup-server-launch.sh" > \
        "${dest}/videodedup-server-launch.sh"
      chmod 0755 "${dest}/videodedup-server-launch.sh"

apps:
  videodedupserver:
    command: usr/lib/videodedupserver/videodedup-server-launch.sh
    daemon: simple
    environment:
      VIDEODEDUP_APP_DATA: $SNAP_COMMON/data
    plugs:
      - network
      - network-bind
